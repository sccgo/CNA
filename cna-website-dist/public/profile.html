<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNA - حسابي</title>
<link rel="shortcut icon" href="/img/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <a href="/" class="site-logo">
      <img src="/img/logo.svg" alt="CNA" style="height:48px" onerror="this.style.display='none'">
    </a>
    <div class="header-actions" id="header-actions"></div>
  </div>
</header>

<main class="main-content">
  <div class="container" style="max-width:600px">

    <div style="margin-bottom:2rem; padding-bottom:1rem; border-bottom:2px solid #0a0a0a">
      <h1 style="font-family:var(--font-heading); font-size:1.8rem">حسابي</h1>
    </div>

    <div id="form-error" class="alert alert-error" style="display:none"></div>
    <div id="form-success" class="alert alert-success" style="display:none"></div>

    <!-- Profile Info -->
    <div class="admin-form-card" style="background:#fff; border:1px solid #d4d4d4; padding:2rem; margin-bottom:1.5rem">
      <div style="font-family:var(--font-heading); font-size:1.1rem; margin-bottom:1.5rem; padding-bottom:.75rem; border-bottom:1px solid #e5e5e5">
        معلومات الحساب
      </div>

      <div class="form-group">
        <label class="form-label">اسم المستخدم</label>
        <input type="text" class="form-control" id="username" disabled style="background:#f5f5f5; color:#a3a3a3">
        <small style="font-size:.75rem; color:#a3a3a3">لا يمكن تغيير اسم المستخدم</small>
      </div>
      <div class="form-group">
        <label class="form-label">الاسم الكامل</label>
        <input type="text" class="form-control" id="full_name" placeholder="أدخل اسمك الكامل">
      </div>
      <div class="form-group">
        <label class="form-label">الدور</label>
        <input type="text" class="form-control" id="role_display" disabled style="background:#f5f5f5; color:#a3a3a3">
      </div>

      <button onclick="saveName()" class="btn btn-primary">حفظ الاسم</button>
    </div>

    <!-- Change Password -->
    <div class="admin-form-card" style="background:#fff; border:1px solid #d4d4d4; padding:2rem; margin-bottom:1.5rem">
      <div style="font-family:var(--font-heading); font-size:1.1rem; margin-bottom:1.5rem; padding-bottom:.75rem; border-bottom:1px solid #e5e5e5">
        تغيير كلمة المرور
      </div>
      <div class="form-group">
        <label class="form-label">كلمة المرور الحالية</label>
        <input type="password" class="form-control" id="current_password">
      </div>
      <div class="form-group">
        <label class="form-label">كلمة المرور الجديدة</label>
        <input type="password" class="form-control" id="new_password">
      </div>
      <div class="form-group">
        <label class="form-label">تأكيد كلمة المرور الجديدة</label>
        <input type="password" class="form-control" id="new_password2">
      </div>
      <button onclick="changePassword()" class="btn">تغيير كلمة المرور</button>
    </div>

    <div style="display:flex; gap:.75rem; flex-wrap:wrap">
      <a href="/" class="btn btn-ghost">العودة للرئيسية</a>
      <button onclick="logout()" class="btn btn-ghost" style="border-color:#d4d4d4; color:#737373">تسجيل الخروج</button>
    </div>

  </div>
</main>

<script src="/js/utils.js"></script>
<script>
  const roleLabels = { admin:'مدير النظام', editor:'محرر', viewer:'مشترك' };

  async function init() {
    const me = await api('/api/me').catch(()=>({user:null}));
    if (!me.user) { window.location.href = '/login?redirect=/profile'; return; }

    const u = me.user;
    document.getElementById('username').value = u.username;
    document.getElementById('full_name').value = u.full_name || '';
    document.getElementById('role_display').value = roleLabels[u.role] || u.role;

    const el = document.getElementById('header-actions');
    if (el) el.innerHTML = `<button onclick="logout()" class="btn btn-sm btn-ghost">خروج</button>`;
  }

  async function saveName() {
    const full_name = document.getElementById('full_name').value.trim();
    const errEl = document.getElementById('form-error');
    const succEl = document.getElementById('form-success');
    errEl.style.display='none'; succEl.style.display='none';
    if (!full_name) { errEl.textContent='الاسم لا يمكن أن يكون فارغاً'; errEl.style.display='block'; return; }
    try {
      const r = await api('/api/profile', { method:'PUT', body: JSON.stringify({ full_name }) });
      succEl.textContent = 'تم حفظ الاسم بنجاح: ' + r.full_name;
      succEl.style.display='block';
      showToast('تم حفظ الاسم');
    } catch(e) { errEl.textContent=e.message; errEl.style.display='block'; }
  }

  async function changePassword() {
    const cp = document.getElementById('current_password').value;
    const np = document.getElementById('new_password').value;
    const np2 = document.getElementById('new_password2').value;
    const errEl = document.getElementById('form-error');
    const succEl = document.getElementById('form-success');
    errEl.style.display='none'; succEl.style.display='none';
    if (!cp||!np||!np2) { errEl.textContent='يرجى تعبئة جميع الحقول'; errEl.style.display='block'; return; }
    if (np !== np2) { errEl.textContent='كلمتا المرور الجديدتان غير متطابقتين'; errEl.style.display='block'; return; }
    try {
      await api('/api/change-password', { method:'POST', body: JSON.stringify({ current_password:cp, new_password:np }) });
      document.getElementById('current_password').value='';
      document.getElementById('new_password').value='';
      document.getElementById('new_password2').value='';
      succEl.textContent='تم تغيير كلمة المرور بنجاح';
      succEl.style.display='block';
      showToast('تم تغيير كلمة المرور');
    } catch(e) { errEl.textContent=e.message; errEl.style.display='block'; }
  }

  init();
</script>
</body>
</html>
