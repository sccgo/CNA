<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <!-- Background -->
  <rect width="320" height="120" fill="#ffffff"/>
  
  <!-- Left vertical bar -->
  <rect x="12" y="12" width="6" height="96" fill="#0a0a0a"/>
  
  <!-- Top horizontal bar -->
  <rect x="12" y="12" width="60" height="6" fill="#0a0a0a"/>
  
  <!-- Bottom horizontal bar -->
  <rect x="12" y="102" width="60" height="6" fill="#0a0a0a"/>

  <!-- C letter shape (bracket) -->
  <rect x="18" y="18" width="4" height="84" fill="#0a0a0a" opacity="0.15"/>

  <!-- CNA Letters -->
  <text x="82" y="82" font-family="Georgia, serif" font-size="72" font-weight="700" letter-spacing="8" fill="#0a0a0a">CNA</text>

  <!-- Thin separator line -->
  <rect x="12" y="108" width="296" height="2" fill="#0a0a0a"/>

  <!-- Arabic subtitle -->
  <text x="308" y="118" font-family="Arial, sans-serif" font-size="10" fill="#737373" text-anchor="end" letter-spacing="1">وكالة الأنباء التنسيقية</text>
</svg>
