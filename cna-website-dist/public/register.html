<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNA - إنشاء حساب</title>
<link rel="shortcut icon" href="/img/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <img src="/img/logo.svg" alt="CNA" style="height:60px; display:block; margin:0 auto 0.5rem">
      <div class="login-divider"></div>
      <span class="logo-ar" style="display:block; text-align:center; color:#737373; font-size:0.95rem">إنشاء حساب جديد</span>
    </div>

    <div id="error-msg" class="alert alert-error" style="display:none"></div>
    <div id="success-msg" class="alert alert-success" style="display:none"></div>

    <div class="form-group">
      <label class="form-label">اسم المستخدم *</label>
      <input type="text" class="form-control" id="username" placeholder="أحرف إنجليزية أو عربية وأرقام" autocomplete="username">
      <small style="font-size:0.75rem; color:#a3a3a3">3 أحرف على الأقل، بدون مسافات أو رموز</small>
    </div>
    <div class="form-group">
      <label class="form-label">الاسم الكامل</label>
      <input type="text" class="form-control" id="full_name" placeholder="اسمك الكامل (اختياري)">
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور *</label>
      <input type="password" class="form-control" id="password" placeholder="6 أحرف على الأقل" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label class="form-label">تأكيد كلمة المرور *</label>
      <input type="password" class="form-control" id="password2" placeholder="أعد إدخال كلمة المرور" autocomplete="new-password">
    </div>

    <button class="btn btn-primary" style="width:100%; padding:0.85rem; font-size:1rem; margin-top:0.5rem" onclick="register()" id="reg-btn">
      إنشاء الحساب
    </button>

    <div style="margin-top:1.5rem; text-align:center; display:flex; flex-direction:column; gap:0.5rem">
      <a href="/login" style="font-size:0.875rem; color:#0a0a0a; font-weight:600">لديك حساب بالفعل؟ سجّل الدخول</a>
      <a href="/" style="font-size:0.85rem; color:#737373">العودة للموقع</a>
    </div>
  </div>
</div>

<script src="/js/utils.js"></script>
<script>
  // If already logged in
  api('/api/me').then(d => { if (d.user) window.location.href = '/'; }).catch(()=>{});

  document.getElementById('password2').addEventListener('keydown', e => { if (e.key==='Enter') register(); });

  async function register() {
    const errEl = document.getElementById('error-msg');
    const btn = document.getElementById('reg-btn');
    errEl.style.display = 'none';

    const username  = document.getElementById('username').value.trim();
    const full_name = document.getElementById('full_name').value.trim();
    const password  = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;

    if (!username || !password) { errEl.textContent='يرجى تعبئة الحقول المطلوبة'; errEl.style.display='block'; return; }
    if (password !== password2) { errEl.textContent='كلمتا المرور غير متطابقتين'; errEl.style.display='block'; return; }

    btn.textContent = '...'; btn.disabled = true;

    try {
      await api('/api/register', { method:'POST', body: JSON.stringify({ username, full_name, password }) });
      document.getElementById('success-msg').textContent = 'تم إنشاء الحساب بنجاح! جاري التحويل...';
      document.getElementById('success-msg').style.display = 'block';
      setTimeout(() => window.location.href = '/', 1200);
    } catch(e) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
      btn.textContent = 'إنشاء الحساب'; btn.disabled = false;
    }
  }
</script>
</body>
</html>
