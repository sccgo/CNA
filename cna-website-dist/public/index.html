<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>وكالة الأنباء التنسيقية - CNA</title>
<link rel="shortcut icon" href="/img/cna1.png" type="image/svg+xml">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-top">
    <a href="/" class="site-logo">
      <img src="/img/cna.png" alt="CNA" onerror="this.style.display='none';document.getElementById('logo-fb').style.display='flex'">
      <div id="logo-fb" style="display:none;flex-direction:column;gap:2px">
        <span class="logo-en">CNA</span><span class="logo-ar">وكالة الأنباء التنسيقية</span><div class="logo-line"></div>
      </div>
    </a>
    <form class="search-form" onsubmit="doSearch(event)">
      <input type="text" id="q" placeholder="ابحث في الأخبار..." autocomplete="off" value="">
      <button type="submit">بحث</button>
    </form>
    <div id="header-actions" class="header-actions">
      <a href="/login" class="btn btn-sm btn-primary">دخول</a>
    </div>
  </div>
  <nav class="nav-bar"><div class="nav-inner" id="nav-depts">
    <a class="nav-link active" href="/" onclick="selectDept('',this,event)">الكل</a>
  </div></nav>
</header>

<!-- BREAKING TICKER -->
<div class="breaking-ticker" id="breaking-ticker" style="display:none">
  <div class="ticker-label"><span class="ticker-dot"></span>عاجل</div>
  <div class="ticker-outer"><div id="ticker-track" class="ticker-track"></div></div>
</div>

<!-- MAIN -->
<main class="main-content"><div class="container">

  <!-- LIVE -->
  <div id="live-section"></div>

  <!-- HERO -->
  <section class="hero-section" id="hero-section" style="display:none"></section>

  <!-- LANG + FILTERS -->
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:1rem">
    <div class="lang-switcher" id="lang-switcher">
      <button class="lang-btn active" onclick="setLang('ar',this)">العربية</button>
      <button class="lang-btn" onclick="setLang('en',this)">English</button>
      <button class="lang-btn" onclick="setLang('both',this)">الكل</button>
    </div>
    <div class="filters-bar" style="border:none;padding:0;margin:0" id="filters-bar">
      <button class="filter-chip active" onclick="setFilter('all',this)">الكل</button>
      <button class="filter-chip" onclick="setFilter('breaking',this)">عاجل</button>
      <button class="filter-chip" onclick="setFilter('live',this)">بث مباشر</button>
    </div>
  </div>

  <!-- NEWS -->
  <div class="content-with-sidebar">
    <div>
      <div class="news-section-header">
        <h2 class="section-title" id="section-title">آخر الأخبار</h2>
        <div class="controls-row" style="margin:0">
          <span class="results-info" id="results-info"></span>
        </div>
      </div>
      <div id="news-grid" class="news-grid"><div class="loading"></div></div>
      <div id="pagination"></div>
    </div>
    <aside class="sidebar">
      <div class="sidebar-widget">
        <h3 class="sidebar-widget-title">عاجل</h3>
        <div id="sb-breaking"><div class="loading" style="padding:1rem"></div></div>
      </div>
      <div class="sidebar-widget">
        <h3 class="sidebar-widget-title">الشعب</h3>
        <div id="sb-depts"></div>
      </div>
      <div class="sidebar-widget">
        <h3 class="sidebar-widget-title">الأرشيف</h3>
        <div id="sb-archive"></div>
      </div>
    </aside>
  </div>

  <!-- WORLD NEWS -->
  <div id="world-section" class="world-news-section" style="display:none">
    <div class="news-section-header">
      <h2 class="section-title">أخبار عالمية</h2>
    </div>
    <div class="world-controls">
      <select id="wn-country" onchange="loadWorldNews()">
        <option value="ae">الإمارات</option><option value="sa">السعودية (غير متاح)</option>
        <option value="eg">مصر (غير متاح)</option><option value="us" selected>الولايات المتحدة</option>
        <option value="gb">بريطانيا</option><option value="de">ألمانيا</option>
        <option value="fr">فرنسا</option><option value="jp">اليابان</option>
        <option value="cn">الصين</option><option value="in">الهند</option>
        <option value="au">أستراليا</option><option value="ca">كندا</option>
        <option value="ru">روسيا</option><option value="br">البرازيل</option>
      </select>
      <select id="wn-category" onchange="loadWorldNews()">
        <option value="general">عام</option><option value="business">أعمال</option>
        <option value="technology">تقنية</option><option value="sports">رياضة</option>
        <option value="health">صحة</option><option value="science">علوم</option>
        <option value="entertainment">ترفيه</option>
      </select>
      <button onclick="loadWorldNews()" class="btn btn-sm">تحديث</button>
    </div>
    <div id="world-grid" class="world-news-grid"></div>
    <div id="world-error" style="display:none"></div>
  </div>

</div></main>

<footer class="site-footer"><div class="footer-inner">
  <div class="footer-grid">
    <div>
      <div class="footer-logo">
        <img src="/img/cna.png" alt="CNA" onerror="this.parentElement.innerHTML='<div class=\'footer-logo-en\'>CNA</div><div class=\'footer-logo-ar\'>وكالة الأنباء التنسيقية</div>'">
  <img src="/img/2026.png" alt="صورة">
     </div>

      <p class="footer-desc" id="footer-tagline">المصدر الرسمي للأنباء والمعلومات الموثوقة</p>
    </div>
    <div><div class="footer-col-title">التصفح</div><div class="footer-links" id="footer-dept-links"></div></div>
    <div><div class="footer-col-title">الوكالة</div><div class="footer-links">
      <a href="/archive">الأرشيف</a>
      <a href="/?filter=breaking">الأخبار العاجلة</a>
      <a href="/login">بوابة الدخول</a>
    </div></div>
  </div>
  <div class="footer-bottom"><span id="footer-year"></span><span>وكالة الأنباء التنسيقية - جميع الحقوق محفوظة</span></div>
</div></footer>

<script src="/js/utils.js"></script>
<script>
document.getElementById('footer-year').textContent = new Date().getFullYear();
const UP = new URLSearchParams(window.location.search);

let curPage=1, curFilter='all', curDept='', curLang='ar', settings={};
if(UP.get('q'))document.getElementById('q').value=UP.get('q');
if(UP.get('filter'))curFilter=UP.get('filter');
const pathDept=location.pathname.match(/\/category\/(.+)/);
if(pathDept)curDept=pathDept[1];

async function init(){
  await initHeader();
  settings=await api('/api/settings').catch(()=>({}));
  applySettings();
  await loadDepts();
  loadLive();
  loadFeatured();
  loadBreakingTicker();
  loadNews(1);
  loadSidebarBreaking();
  loadSidebarArchive();
  if(settings.show_world_news==='1' && settings.newsapi_key) {
    document.getElementById('world-section').style.display='block';
    loadWorldNews();
  }
}

function applySettings(){
  if(settings.site_name) document.title='وكالة الأنباء التنسيقية - ' + (settings.site_name_en||'CNA');
  if(settings.site_tagline) document.getElementById('footer-tagline').textContent=settings.site_tagline;
  if(settings.newsapi_country){ const s=document.getElementById('wn-country'); if(s)s.value=settings.newsapi_country; }
  if(settings.newsapi_category){ const s=document.getElementById('wn-category'); if(s)s.value=settings.newsapi_category; }
}

async function loadBreakingTicker(){
  try{
    const news=await api('/api/news/breaking');
    if(!news.length)return;
    initTicker(news, parseInt(settings.ticker_speed)||40, settings.ticker_bg, settings.ticker_text_color);
  }catch{}
}

async function loadLive(){
  try{
    const items=await api('/api/news/live');
    if(!items.length)return;
    document.getElementById('live-section').innerHTML=`
      <div class="live-section-box">
        <div class="live-section-head">
          <span class="live-dot-pulse"></span>
          <span class="live-section-label">بث مباشر الآن</span>
        </div>
        ${items.map(n=>`
          <div class="live-item-row" onclick="location.href='/news/${n.id}'">
            <span class="live-badge-inline"><span class="live-dot-sm"></span>LIVE</span>
            <span class="live-item-title">${escHtml(n.title)}</span>
          </div>`).join('')}
      </div>`;
  }catch{}
}

async function loadFeatured(){
  try{
    const n=await api('/api/news/featured');
    if(!n)return;
    const sec=document.getElementById('hero-section');
    sec.style.display='block';

    // Hero panel background
    let panelStyle='background:var(--white)', panelClass='hero-info';
    if(n.hero_bg_type==='color'&&n.hero_bg_color){ panelStyle=`background:${n.hero_bg_color}`; panelClass+=' dark-panel'; }
    else if(n.hero_bg_type==='gradient'&&n.hero_bg_gradient){ panelStyle=`background:${n.hero_bg_gradient}`; panelClass+=' dark-panel'; }
    else if(n.hero_bg_type==='image'&&n.hero_bg_image){ panelClass+=' dark-panel'; }

    const counterHtml=n.counter?buildCounterHtml(n.counter):'';
    const imgHtml=n.main_image?`<img src="${n.main_image}" alt="${escHtml(n.title)}">`:`<div class="hero-no-image">CNA</div>`;

    sec.innerHTML=`
      <div class="news-section-header"><h2 class="section-title">الخبر الرئيسي</h2></div>
      <div class="hero-box">
        <div class="hero-image-wrap">${imgHtml}</div>
        <div class="${panelClass}" style="${panelStyle}">
          ${n.hero_bg_type==='image'&&n.hero_bg_image?`<div class="hero-info-bg" style="background-image:url('${n.hero_bg_image}')"></div><div class="hero-info-overlay"></div>`:''}
          <div class="hero-info-content">
            ${n.is_breaking?'<span class="hero-badge">عاجل</span>':'<span class="hero-badge">مميز</span>'}
            <h1 class="hero-title">${escHtml(n.title)}</h1>
            <p class="hero-desc">${escHtml(n.short_description||'')}</p>
            <div class="hero-meta">
              <span>${n.department_name||''}</span>
              <span>${formatDateTime(n.created_at)}</span>
            </div>
            ${counterHtml}
            <a href="/news/${n.id}" class="hero-read-btn">قراءة الخبر كاملاً</a>
          </div>
        </div>
      </div>`;
    if(n.counter)startCounter(n.counter);
  }catch{}
}

function buildCounterHtml(c){
  const bg=c.bg_gradient?`background:${c.bg_gradient}`:c.bg_image?`background-image:url('${c.bg_image}');background-size:cover`:`background:${c.bg_color||'#000'}`;
  const font=c.font_style==='serif'?'Amiri,serif':'Cairo,sans-serif';
  return `<div class="counter-widget"><div class="counter-bg" style="${bg}"></div>
    <div class="counter-inner" style="color:${c.text_color||'#fff'};font-family:${font}">
      <div class="counter-label">${escHtml(c.label||'منذ')}</div>
      <div class="counter-display" id="counter-display"></div>
    </div></div>`;
}
function startCounter(c){
  function upd(){const el=document.getElementById('counter-display');if(!el)return;const s=new Date(c.start_date),now=new Date();let diff=c.direction==='down'?(s-now):(now-s);if(diff<0)diff=0;const ts=Math.floor(diff/1000),d=Math.floor(ts/86400),h=Math.floor((ts%86400)/3600),m=Math.floor((ts%3600)/60),sec=ts%60;el.innerHTML=[{n:d,l:'يوم'},{n:h,l:'ساعة'},{n:m,l:'دقيقة'},{n:sec,l:'ثانية'}].map(u=>`<div class="counter-unit"><span class="counter-number">${String(u.n).padStart(2,'0')}</span><span class="counter-name">${u.l}</span></div>`).join('');}
  upd();setInterval(upd,1000);
}

async function loadDepts(){
  const depts=await api('/api/departments').catch(()=>[]);
  const nav=document.getElementById('nav-depts');
  const fl=document.getElementById('footer-dept-links');
  const sd=document.getElementById('sb-depts');
  depts.forEach(d=>{
    const a=document.createElement('a');a.className='nav-link'+(curDept===d.slug?' active':'');
    a.textContent=d.name;a.href=`/category/${d.slug}`;
    a.onclick=e=>{e.preventDefault();selectDept(d.slug,a);};nav.appendChild(a);
    if(fl){const l=document.createElement('a');l.href=`/category/${d.slug}`;l.textContent=d.name;fl.appendChild(l);}
    if(sd)sd.innerHTML+=(sd.innerHTML?'':``) + `<div class="sidebar-news-item" style="cursor:pointer;border:none;padding:.4rem 0" onclick="selectDept('${d.slug}')">
      <div><div class="sidebar-news-title">${escHtml(d.name)}</div><div class="sidebar-news-date">${d.news_count} خبر</div></div></div>`;
  });
}

function selectDept(slug,el,ev){
  if(ev)ev.preventDefault();
  curDept=slug; curPage=1;
  document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
  if(el)el.classList.add('active');
  else {const found=document.querySelector(`.nav-link[href="/category/${slug}"]`);if(found)found.classList.add('active');}
  if(!slug){const first=document.querySelector('.nav-link');if(first)first.classList.add('active');}
  loadNews(1);
}

function setFilter(f,el){
  curFilter=f; curPage=1;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  if(el)el.classList.add('active');
  const titles={all:'آخر الأخبار',breaking:'الأخبار العاجلة',live:'البث المباشر'};
  document.getElementById('section-title').textContent=titles[f]||'آخر الأخبار';
  loadNews(1);
}

function setLang(l,el){
  curLang=l; curPage=1;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  loadNews(1);
}

async function loadNews(page=1){
  curPage=page;
  const grid=document.getElementById('news-grid');
  grid.innerHTML='<div class="loading"></div>';
  const q=document.getElementById('q').value.trim();
  const params=new URLSearchParams({page,limit:12});
  if(curDept)params.set('department',curDept);
  if(curFilter==='breaking')params.set('breaking','1');
  if(curFilter==='live')params.set('live','1');
  if(curLang!=='both')params.set('lang',curLang);
  if(q)params.set('search',q);
  try{
    const data=await api('/api/news?'+params);
    document.getElementById('results-info').textContent=`${data.total} خبر`;
    if(!data.news.length){grid.innerHTML='<div class="empty-state"><div class="empty-state-title">لا توجد أخبار</div><p>لم يتم العثور على أخبار مطابقة</p></div>';document.getElementById('pagination').innerHTML='';return;}
    grid.innerHTML=data.news.map(n=>renderNewsCard(n,curLang==='both'?'ar':curLang)).join('');
    document.getElementById('pagination').innerHTML=renderPagination(page,data.pages,'loadNews');
  }catch(e){grid.innerHTML=`<div class="empty-state"><p>خطأ: ${e.message}</p></div>`;}
}

async function loadSidebarBreaking(){
  try{
    const d=await api('/api/news?breaking=1&limit=5');
    const el=document.getElementById('sb-breaking');
    if(!d.news.length){el.innerHTML='<p style="font-size:.85rem;color:#aaa;padding:.5rem 0">لا توجد أخبار عاجلة</p>';return;}
    el.innerHTML=d.news.map(n=>`<div class="sidebar-news-item" onclick="location.href='/news/${n.id}'">
      ${n.main_image?`<img src="${n.main_image}" class="sidebar-news-img" alt="">`:''}
      <div><div class="sidebar-news-title">${escHtml(n.title)}</div><div class="sidebar-news-date">${timeAgo(n.created_at)}</div></div>
    </div>`).join('');
  }catch{}
}

async function loadSidebarArchive(){
  try{
    const arc=await api('/api/archive');
    const el=document.getElementById('sb-archive');
    const mn=['','يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    el.innerHTML=arc.slice(0,6).map(a=>`<div class="sidebar-news-item" style="cursor:pointer;border:none;padding:.4rem 0" onclick="location.href='/archive?year=${a.year}&month=${a.month}'">
      <div><div class="sidebar-news-title">${mn[parseInt(a.month)]} ${a.year}</div><div class="sidebar-news-date">${a.count} خبر</div></div></div>`).join('');
  }catch{}
}

async function loadWorldNews(){
  const country=document.getElementById('wn-country').value;
  const category=document.getElementById('wn-category').value;
  const grid=document.getElementById('world-grid');
  const errEl=document.getElementById('world-error');
  grid.innerHTML='<div class="loading"></div>';errEl.style.display='none';
  try{
    const data=await api(`/api/world-news?country=${country}&category=${category}`);
    if(data.error==='no_key'){
      grid.innerHTML='';
      errEl.innerHTML='<div style="padding:1.5rem;text-align:center;color:#737373;font-size:.9rem">لإظهار الأخبار العالمية، أضف مفتاح NewsAPI في <a href="/admin/settings" style="color:#000;font-weight:700">الإعدادات</a>.<br><small>مجاني من <a href="https://newsapi.org" target="_blank" style="color:#000">newsapi.org</a></small></div>';
      errEl.style.display='block';return;
    }
    if(!data.articles?.length){grid.innerHTML='<div class="empty-state" style="padding:2rem"><p>لا توجد أخبار</p></div>';return;}
    grid.innerHTML=data.articles.map(a=>`
      <div class="world-card" onclick="window.open('${escHtml(a.url)}','_blank')">
        ${a.urlToImage?`<img class="world-card-img" src="${escHtml(a.urlToImage)}" alt="" loading="lazy" onerror="this.style.display='none'">`:''}
        <div class="world-card-body">
          <div class="world-card-source">${escHtml(a.source?.name||'')}</div>
          <div class="world-card-title">${escHtml(a.title||'')}</div>
          ${a.description?`<div class="world-card-desc">${escHtml(a.description)}</div>`:''}
          <div class="world-card-date">${a.publishedAt?new Date(a.publishedAt).toLocaleDateString('en-GB'):''}</div>
        </div>
      </div>`).join('');
  }catch(e){grid.innerHTML='';errEl.textContent='حدث خطأ في تحميل الأخبار: '+e.message;errEl.style.display='block';}
}

function doSearch(e){e.preventDefault();const q=document.getElementById('q').value.trim();if(q){window.location.href='/?q='+encodeURIComponent(q);}else{window.location.href='/';}}

init();
</script>
</body>
</html>
