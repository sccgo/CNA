<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNA - لوحة التحكم</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="admin-wrap" id="admin-wrap">

  <!-- SIDEBAR -->
  <div class="admin-sidebar" id="admin-sidebar">
    <div class="admin-sidebar-logo">
      <div class="admin-logo-en">CNA</div>
      <div class="admin-logo-ar">وكالة الأنباء التنسيقية</div>
    </div>
    <div class="admin-user-info">
      <div class="admin-user-name" id="admin-user-name">...</div>
      <div id="admin-user-role" style="font-size:0.75rem; color:rgba(255,255,255,0.4)"></div>
    </div>
    <nav class="admin-nav">
      <div class="admin-nav-section">الرئيسية</div>
      <a href="/admin" class="admin-nav-link active"><span class="admin-nav-icon">&#9632;</span> لوحة التحكم</a>
      <a href="/" class="admin-nav-link" target="_blank"><span class="admin-nav-icon">&#9633;</span> عرض الموقع</a>
      <div class="admin-nav-section">الأخبار</div>
      <a href="/admin/create" class="admin-nav-link"><span class="admin-nav-icon">+</span> إنشاء خبر جديد</a>
      <div class="admin-nav-section">الإعدادات</div>
      <a href="/admin/departments" class="admin-nav-link"><span class="admin-nav-icon">&#9650;</span> الشعب</a>
      <a href="/admin/settings" class="admin-nav-link"><span class="admin-nav-icon">&#9881;</span> إعدادات الموقع</a>
      <a href="/admin/users" class="admin-nav-link"><span class="admin-nav-icon">&#9786;</span> المستخدمين</a>
    </nav>
    <div style="padding:1.5rem; border-top:1px solid rgba(255,255,255,0.1)">
      <button onclick="logout()" class="btn" style="width:100%; border-color:rgba(255,255,255,0.2); color:rgba(255,255,255,0.5); font-size:0.8rem">تسجيل الخروج</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="admin-main">
    <div class="admin-topbar">
      <h1 class="admin-page-title">لوحة التحكم</h1>
      <a href="/admin/create" class="btn btn-primary btn-sm">+ إنشاء خبر جديد</a>
    </div>
    <div class="admin-content">

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="loading" style="padding:1rem"></div></div>
      </div>

      <!-- Filters -->
      <div style="display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap; align-items:center; justify-content:space-between">
        <div style="display:flex; gap:0.5rem; flex-wrap:wrap">
          <input type="text" class="form-control" id="search-news" placeholder="ابحث في الأخبار..." style="width:220px" oninput="debounceSearch()">
          <select class="form-control" id="filter-dept" style="width:160px" onchange="loadNews(1)">
            <option value="">كل الشعب</option>
          </select>
          <select class="form-control" id="filter-breaking" style="width:130px" onchange="loadNews(1)">
            <option value="">الكل</option>
            <option value="1">عاجل فقط</option>
            <option value="0">غير عاجل</option>
          </select>
        </div>
        <span id="total-count" style="font-size:0.85rem; color:#737373"></span>
      </div>

      <!-- News Table -->
      <div class="admin-table-wrap" id="news-table-wrap">
        <div class="loading"></div>
      </div>
      <div id="pagination"></div>

    </div>
  </div>
</div>

<script src="/js/utils.js"></script>
<script>
  let currentPage = 1;
  let searchTimer;

  async function init() {
    const me = await api('/api/me');
    if (!me.user) { window.location.href = '/login?redirect=/admin'; return; }
    document.getElementById('admin-user-name').textContent = me.user.full_name || me.user.username;
    document.getElementById('admin-user-role').textContent = me.user.role === 'admin' ? 'مدير النظام' : 'محرر';
    
    await loadStats();
    await loadDepts();
    await loadNews(1);
  }

  async function loadStats() {
    try {
      const [newsData, depts] = await Promise.all([
        api('/api/news?limit=1'),
        api('/api/departments')
      ]);
      const breaking = await api('/api/news?breaking=1&limit=1');
      const featured = await api('/api/news?featured=1&limit=1');
      
      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card">
          <div class="stat-number">${newsData.total}</div>
          <div class="stat-label">اجمالي الأخبار</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${breaking.total}</div>
          <div class="stat-label">أخبار عاجلة</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${depts.length}</div>
          <div class="stat-label">شعب نشطة</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${featured.total > 0 ? 'نعم' : 'لا'}</div>
          <div class="stat-label">خبر مميز نشط</div>
        </div>
      `;
    } catch {}
  }

  async function loadDepts() {
    try {
      const depts = await api('/api/departments');
      const sel = document.getElementById('filter-dept');
      depts.forEach(d => {
        const o = document.createElement('option');
        o.value = d.slug;
        o.textContent = d.name;
        sel.appendChild(o);
      });
    } catch {}
  }

  async function loadNews(page = 1) {
    currentPage = page;
    const wrap = document.getElementById('news-table-wrap');
    wrap.innerHTML = '<div class="loading"></div>';
    
    const search = document.getElementById('search-news').value.trim();
    const dept = document.getElementById('filter-dept').value;
    const breaking = document.getElementById('filter-breaking').value;
    
    const params = new URLSearchParams({ page, limit: 15, ...(search?{search}:{}), ...(dept?{department:dept}:{}), ...(breaking!==''?{breaking}:{}) });
    
    try {
      const data = await api('/api/news?' + params);
      document.getElementById('total-count').textContent = `${data.total} خبر`;
      
      if (!data.news.length) {
        wrap.innerHTML = '<div class="empty-state" style="padding:2rem"><p>لا توجد أخبار</p></div>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }
      
      wrap.innerHTML = `
        <table class="admin-table">
          <thead>
            <tr>
              <th>#</th>
              <th>عنوان الخبر</th>
              <th>الشعبة</th>
              <th>الحالة</th>
              <th>تاريخ النشر</th>
              <th>المشاهدات</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody>
            ${data.news.map(n => `
              <tr>
                <td style="color:#a3a3a3; font-size:0.8rem">${n.id}</td>
                <td>
                  <a href="/news/${n.id}" target="_blank" style="font-family:var(--font-heading); font-size:0.95rem; font-weight:600; color:#0a0a0a; text-decoration:none; display:block; max-width:350px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">
                    ${n.title}
                  </a>
                  ${n.short_description ? `<span style="font-size:0.78rem; color:#a3a3a3; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:350px">${n.short_description}</span>` : ''}
                </td>
                <td style="font-size:0.85rem; color:#737373">${n.department_name || 'غير محدد'}</td>
                <td>
                  ${n.is_breaking ? '<span class="breaking-badge" style="margin-left:3px">عاجل</span>' : ''}
                  ${n.is_featured ? '<span style="background:#f5f5f5; border:1px solid #ddd; padding:0.1rem 0.5rem; font-size:0.65rem; font-weight:700">مميز</span>' : ''}
                  ${!n.is_breaking && !n.is_featured ? '<span style="color:#a3a3a3; font-size:0.8rem">عادي</span>' : ''}
                </td>
                <td style="font-size:0.8rem; color:#737373; white-space:nowrap">${formatDate(n.created_at)}</td>
                <td style="font-size:0.85rem; color:#737373">${n.views || 0}</td>
                <td>
                  <div style="display:flex; gap:0.4rem">
                    <a href="/admin/edit/${n.id}" class="btn btn-sm">تعديل</a>
                    <button onclick="deleteNews(${n.id})" class="btn btn-sm btn-danger">حذف</button>
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      document.getElementById('pagination').innerHTML = renderPagination(page, data.pages, 'loadNews');
    } catch (e) {
      wrap.innerHTML = `<div class="empty-state"><p>خطأ: ${e.message}</p></div>`;
    }
  }

  async function deleteNews(id) {
    if (!confirm('هل أنت متأكد من حذف هذا الخبر؟ لا يمكن التراجع عن هذه العملية.')) return;
    try {
      await api('/api/news/' + id, { method: 'DELETE' });
      showToast('تم حذف الخبر بنجاح');
      loadNews(currentPage);
      loadStats();
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => loadNews(1), 400);
  }

  init();
</script>
</body>
</html>
