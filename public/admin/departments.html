<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNA - إدارة الشعب</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="admin-wrap">
  <div class="admin-sidebar">
    <div class="admin-sidebar-logo">
      <div class="admin-logo-en">CNA</div>
      <div class="admin-logo-ar">وكالة الأنباء التنسيقية</div>
    </div>
    <div class="admin-user-info">
      <div class="admin-user-name" id="admin-user-name">...</div>
    </div>
    <nav class="admin-nav">
      <div class="admin-nav-section">الرئيسية</div>
      <a href="/admin" class="admin-nav-link"><span class="admin-nav-icon">&#9632;</span> لوحة التحكم</a>
      <a href="/" class="admin-nav-link" target="_blank"><span class="admin-nav-icon">&#9633;</span> عرض الموقع</a>
      <div class="admin-nav-section">الأخبار</div>
      <a href="/admin/create" class="admin-nav-link"><span class="admin-nav-icon">+</span> إنشاء خبر</a>
      <div class="admin-nav-section">الإعدادات</div>
      <a href="/admin/departments" class="admin-nav-link active"><span class="admin-nav-icon">&#9650;</span> الشعب</a>
      <a href="/admin/settings" class="admin-nav-link"><span class="admin-nav-icon">&#9881;</span> الإعدادات</a>
      <a href="/admin/users" class="admin-nav-link"><span class="admin-nav-icon">&#9786;</span> المستخدمين</a>
    </nav>
    <div style="padding:1.5rem; border-top:1px solid rgba(255,255,255,0.1)">
      <button onclick="logout()" class="btn" style="width:100%; border-color:rgba(255,255,255,0.2); color:rgba(255,255,255,0.5); font-size:0.8rem">تسجيل الخروج</button>
    </div>
  </div>

  <div class="admin-main">
    <div class="admin-topbar">
      <h1 class="admin-page-title">إدارة الشعب</h1>
      <button onclick="toggleAddForm()" class="btn btn-primary">+ إضافة شعبة</button>
    </div>
    <div class="admin-content">

      <div class="admin-form-card" id="add-form" style="display:none">
        <div class="admin-form-card-title">إضافة شعبة جديدة</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">اسم الشعبة (عربي)</label>
            <input type="text" class="form-control" id="dept-name" placeholder="مثال: الشؤون الدولية">
          </div>
          <div class="form-group">
            <label class="form-label">المعرف (إنجليزي - slug)</label>
            <input type="text" class="form-control" id="dept-slug" placeholder="مثال: international" oninput="sanitizeSlug(this)">
            <small style="font-size:0.75rem; color:#a3a3a3">أحرف إنجليزية وشرطة فقط، بدون مسافات</small>
          </div>
        </div>
        <div style="display:flex; gap:0.5rem">
          <button onclick="addDept()" class="btn btn-primary">إضافة</button>
          <button onclick="toggleAddForm()" class="btn btn-ghost">إلغاء</button>
        </div>
      </div>

      <div class="admin-table-wrap">
        <div id="depts-table"><div class="loading"></div></div>
      </div>
    </div>
  </div>
</div>

<script src="/js/utils.js"></script>
<script>
  async function init() {
    const me = await api('/api/me');
    if (!me.user) { window.location.href = '/login'; return; }
    document.getElementById('admin-user-name').textContent = me.user.full_name || me.user.username;
    loadDepts();
  }

  async function loadDepts() {
    try {
      const depts = await api('/api/departments');
      document.getElementById('depts-table').innerHTML = `
        <table class="admin-table">
          <thead>
            <tr>
              <th>#</th>
              <th>اسم الشعبة</th>
              <th>المعرف (Slug)</th>
              <th>عدد الأخبار</th>
              <th>تاريخ الإنشاء</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody>
            ${depts.map(d => `
              <tr>
                <td style="color:#a3a3a3; font-size:0.8rem">${d.id}</td>
                <td style="font-weight:600; font-family:var(--font-heading)">${d.name}</td>
                <td style="font-family:monospace; font-size:0.85rem; color:#737373">${d.slug}</td>
                <td>${d.news_count || 0}</td>
                <td style="font-size:0.8rem; color:#737373">${formatDate(d.created_at)}</td>
                <td>
                  <button onclick="deleteDept(${d.id}, '${d.name}')" class="btn btn-sm btn-danger">حذف</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  function sanitizeSlug(input) {
    input.value = input.value.toLowerCase().replace(/[^a-z0-9-]/g, '-').replace(/-+/g, '-');
  }

  // Auto-generate slug from name
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('dept-name')?.addEventListener('input', function() {
      // Don't auto-overwrite if user has edited slug manually
    });
  });

  function toggleAddForm() {
    const f = document.getElementById('add-form');
    f.style.display = f.style.display === 'none' ? 'block' : 'none';
  }

  async function addDept() {
    const name = document.getElementById('dept-name').value.trim();
    const slug = document.getElementById('dept-slug').value.trim();
    if (!name || !slug) { showToast('يرجى ملء جميع الحقول', 'error'); return; }
    if (!/^[a-z0-9-]+$/.test(slug)) { showToast('المعرف يجب أن يحتوي على أحرف إنجليزية وشرطة فقط', 'error'); return; }
    try {
      await api('/api/departments', { method: 'POST', body: JSON.stringify({ name, slug }) });
      showToast('تم إضافة الشعبة بنجاح');
      document.getElementById('dept-name').value = '';
      document.getElementById('dept-slug').value = '';
      toggleAddForm();
      loadDepts();
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  async function deleteDept(id, name) {
    if (!confirm(`هل أنت متأكد من حذف شعبة "${name}"؟\nملاحظة: سيتم إلغاء ربط الأخبار بهذه الشعبة.`)) return;
    try {
      await api('/api/departments/' + id, { method: 'DELETE' });
      showToast('تم حذف الشعبة');
      loadDepts();
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  init();
</script>
</body>
</html>
